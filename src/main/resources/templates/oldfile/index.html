<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>연습 페이지</title>
    <style>
        :root {
            --hama-blue: #1687ff;
            --hama-blue-dark: #0069d9;
            --hama-sky: #e9f5ff;
            --hama-soft: #f6fbff;
            --hama-cream: #fffaf0;
            --hama-text: #263238;
            --hama-gray: #eef2f5;
            --hama-border: #d9e6f2;
        }

        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f8fbff 0%, #eef7ff 100%);
            font-family: 'Arial', sans-serif;
        }

        .title {
            font-size: 4rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .welcome-msg {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #555;
        }

        .button-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            display: inline-block;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 14px;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
        }

        .btn-login { background-color: #007bff; }
        .btn-login:hover { background-color: #0056b3; }

        .btn-signup { background-color: #28a745; }
        .btn-signup:hover { background-color: #218838; }

        .btn-logout { background-color: #dc3545; }
        .btn-logout:hover { background-color: #c82333; }

        /* ===============================
           하마 챗봇 플로팅 버튼
        =============================== */
        .chatbot-toggle {
            position: fixed;
            right: 32px;
            bottom: 32px;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #3aa0ff, #007bff);
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(0, 123, 255, 0.35);
            z-index: 1000;
            transition: transform 0.2s, box-shadow 0.2s;
            padding: 0;
        }

        .chatbot-toggle:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 16px 34px rgba(0, 123, 255, 0.45);
        }

        .hama-face {
            position: relative;
            width: 48px;
            height: 38px;
            margin: 16px auto 0;
            background: #ffffff;
            border-radius: 45% 45% 50% 50%;
            box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.06);
        }

        .hama-face::before,
        .hama-face::after {
            content: "";
            position: absolute;
            top: -7px;
            width: 15px;
            height: 15px;
            background: #ffffff;
            border-radius: 50%;
        }

        .hama-face::before {
            left: 6px;
        }

        .hama-face::after {
            right: 6px;
        }

        .hama-eye {
            position: absolute;
            top: 13px;
            width: 5px;
            height: 5px;
            background: #1687ff;
            border-radius: 50%;
        }

        .hama-eye.left {
            left: 15px;
        }

        .hama-eye.right {
            right: 15px;
        }

        .hama-nose {
            position: absolute;
            left: 50%;
            bottom: 7px;
            transform: translateX(-50%);
            width: 25px;
            height: 12px;
            background: #e9f5ff;
            border-radius: 14px;
        }

        .hama-nose::before,
        .hama-nose::after {
            content: "";
            position: absolute;
            top: 4px;
            width: 4px;
            height: 4px;
            background: #1687ff;
            border-radius: 50%;
        }

        .hama-nose::before {
            left: 7px;
        }

        .hama-nose::after {
            right: 7px;
        }

        /* ===============================
           하마 챗봇 박스
        =============================== */
        .chatbot-box {
            display: none;
            position: fixed;
            right: 32px;
            bottom: 120px;
            width: 420px;
            height: 560px;
            background: white;
            border-radius: 26px;
            box-shadow: 0 18px 45px rgba(0, 52, 110, 0.22);
            overflow: hidden;
            z-index: 1000;
            border: 1px solid var(--hama-border);
        }

        .chatbot-box::before,
        .chatbot-box::after {
            content: "";
            position: absolute;
            top: 48px;
            width: 34px;
            height: 34px;
            background: var(--hama-blue);
            border-radius: 50%;
            z-index: 1001;
        }

        .chatbot-box::before {
            left: 28px;
        }

        .chatbot-box::after {
            right: 28px;
        }

        .chatbot-header {
            position: relative;
            height: 66px;
            background: linear-gradient(135deg, #1687ff 0%, #006ce5 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px;
            font-weight: bold;
            box-sizing: border-box;
            z-index: 1002;
        }

        .chatbot-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chatbot-avatar {
            position: relative;
            width: 38px;
            height: 32px;
            background: white;
            border-radius: 45% 45% 50% 50%;
            box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.06);
        }

        .chatbot-avatar::before,
        .chatbot-avatar::after {
            content: "";
            position: absolute;
            top: -5px;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
        }

        .chatbot-avatar::before {
            left: 5px;
        }

        .chatbot-avatar::after {
            right: 5px;
        }

        .avatar-eye {
            position: absolute;
            top: 11px;
            width: 4px;
            height: 4px;
            background: var(--hama-blue);
            border-radius: 50%;
        }

        .avatar-eye.left {
            left: 12px;
        }

        .avatar-eye.right {
            right: 12px;
        }

        .avatar-nose {
            position: absolute;
            left: 50%;
            bottom: 5px;
            transform: translateX(-50%);
            width: 20px;
            height: 9px;
            background: #e9f5ff;
            border-radius: 12px;
        }

        .chatbot-header-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .chatbot-header-text strong {
            font-size: 15px;
        }

        .chatbot-header-text span {
            font-size: 11px;
            opacity: 0.88;
            font-weight: normal;
        }

        .chatbot-header button {
            background: rgba(255, 255, 255, 0.18);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            line-height: 1;
        }

        .chatbot-header button:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .chatbot-messages {
            height: 428px;
            padding: 18px 16px;
            overflow-y: auto;
            background:
                    radial-gradient(circle at top left, rgba(22, 135, 255, 0.08), transparent 34%),
                    linear-gradient(180deg, #f7fbff 0%, #f1f5f8 100%);
            box-sizing: border-box;
        }

        .bot-message,
        .user-message {
            max-width: 88%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.55;
            white-space: normal;
            overflow-wrap: break-word;
            word-break: keep-all;
            box-sizing: border-box;
        }

        .bot-message {
            position: relative;
            background: #ffffff;
            color: var(--hama-text);
            margin-right: auto;
            border: 1px solid #dfeaf5;
            box-shadow: 0 4px 12px rgba(31, 70, 105, 0.08);
            border-top-left-radius: 8px;
        }

        .bot-message::before {
            content: "hama";
            display: block;
            font-size: 10px;
            color: var(--hama-blue);
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 0.2px;
        }

        .user-message {
            background: linear-gradient(135deg, #1687ff, #006ce5);
            color: white;
            margin-left: auto;
            border-top-right-radius: 8px;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.22);
        }

        .chatbot-input-area {
            height: 66px;
            display: flex;
            gap: 9px;
            padding: 11px 14px;
            border-top: 1px solid #d9e6f2;
            box-sizing: border-box;
            background: white;
        }

        .chatbot-input-area input {
            flex: 1;
            border: 1px solid #c9d9e8;
            border-radius: 16px;
            padding: 0 14px;
            outline: none;
            font-size: 14px;
            background: #fbfdff;
        }

        .chatbot-input-area input:focus {
            border-color: var(--hama-blue);
            box-shadow: 0 0 0 3px rgba(22, 135, 255, 0.12);
        }

        .chatbot-input-area button {
            width: 76px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #1687ff, #006ce5);
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 14px rgba(0, 123, 255, 0.22);
        }

        .chatbot-input-area button:hover {
            background: linear-gradient(135deg, #087cf7, #005dcc);
        }

        .chatbot-item {
            background: #ffffff;
            border: 1px solid #d9e6f2;
            border-radius: 16px;
            padding: 12px;
            margin: 8px 0 12px;
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 4px 12px rgba(31, 70, 105, 0.08);
        }

        .chatbot-item strong {
            color: var(--hama-text);
        }

        .chatbot-item a {
            display: inline-block;
            margin-top: 6px;
            color: var(--hama-blue);
            text-decoration: none;
            font-weight: bold;
        }

        .chatbot-item a:hover {
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            .chatbot-box {
                right: 14px;
                left: 14px;
                width: auto;
                height: 540px;
                bottom: 105px;
            }

            .chatbot-messages {
                height: 408px;
            }

            .chatbot-toggle {
                right: 20px;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div class="title">연습 페이지</div>

<div sec:authorize="isAuthenticated()" style="text-align: center;">
    <div class="welcome-msg">
        <span style="font-weight: bold; color: #007bff;"
              sec:authentication="principal.user.nickname">사용자</span>님 환영합니다!
    </div>
    <div class="button-group">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-logout">로그아웃</button>
        </form>
    </div>
</div>

<div sec:authorize="isAnonymous()">
    <div class="welcome-msg">로그인이 필요합니다.</div>
    <div class="button-group">
        <a th:href="@{/login}" class="btn btn-login">로그인</a>
        <a th:href="@{/signup}" class="btn btn-signup">회원가입</a>
    </div>
</div>

<div sec:authorize="isAuthenticated()">
    <button id="chatbotToggle" class="chatbot-toggle" type="button" aria-label="챗봇 열기">
        <div class="hama-face">
            <span class="hama-eye left"></span>
            <span class="hama-eye right"></span>
            <span class="hama-nose"></span>
        </div>
    </button>

    <div id="chatbotBox" class="chatbot-box">
        <div class="chatbot-header">
            <div class="chatbot-title-wrap">
                <div class="chatbot-avatar">
                    <span class="avatar-eye left"></span>
                    <span class="avatar-eye right"></span>
                    <span class="avatar-nose"></span>
                </div>
                <div class="chatbot-header-text">
                    <strong>hama 챗봇</strong>
                    <span>중고 가격비교 도우미</span>
                </div>
            </div>
            <button id="chatbotClose" type="button" aria-label="챗봇 닫기">×</button>
        </div>

        <div id="chatbotMessages" class="chatbot-messages">
            <div class="bot-message">
                중고거래 가격비교 사이트 하마입니다. 무엇이든 물어보세요!
            </div>
        </div>

        <div class="chatbot-input-area">
            <input
                    id="chatbotInput"
                    type="text"
                    placeholder="메시지를 입력하세요"
                    autocomplete="off"
            />
            <button id="chatbotSend" type="button">전송</button>
        </div>
    </div>
</div>

<script sec:authorize="isAuthenticated()">
    const chatbotToggle = document.getElementById("chatbotToggle");
    const chatbotBox = document.getElementById("chatbotBox");
    const chatbotClose = document.getElementById("chatbotClose");
    const chatbotInput = document.getElementById("chatbotInput");
    const chatbotSend = document.getElementById("chatbotSend");
    const chatbotMessages = document.getElementById("chatbotMessages");

    chatbotToggle.addEventListener("click", () => {
        chatbotBox.style.display = "block";
        chatbotInput.focus();
    });

    chatbotClose.addEventListener("click", () => {
        chatbotBox.style.display = "none";
    });

    chatbotSend.addEventListener("click", sendChatbotMessage);

    chatbotInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            sendChatbotMessage();
        }
    });

    async function sendChatbotMessage() {
        const message = chatbotInput.value.trim();

        if (!message) {
            return;
        }

        addMessage(message, "user-message");
        chatbotInput.value = "";

        const loadingMessage = addMessage("하마가 답변을 준비하고 있어요...", "bot-message");

        try {
            const response = await fetch("/api/chatbot/message", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message
                })
            });

            loadingMessage.remove();

            if (!response.ok) {
                let errorMessage = "챗봇 응답 중 문제가 발생했습니다.";

                try {
                    const errorData = await response.json();

                    if (errorData.message) {
                        errorMessage = errorData.message;
                    } else if (errorData.error) {
                        errorMessage = errorData.error;
                    }
                } catch (e) {
                    errorMessage = `서버 오류가 발생했습니다. 상태 코드: ${response.status}`;
                }

                if (response.status === 401 || response.status === 403) {
                    addMessage("로그인 후 챗봇을 이용할 수 있습니다.", "bot-message");
                    return;
                }

                addMessage(errorMessage, "bot-message");
                return;
            }

            const data = await response.json();

            addMessage(data.answer || "답변을 받지 못했습니다.", "bot-message");

            if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                    addItemMessage(item);
                });
            }

        } catch (error) {
            loadingMessage.remove();
            addMessage("서버와 연결할 수 없습니다.", "bot-message");
        }
    }

    function addMessage(text, className) {
        const messageDiv = document.createElement("div");
        messageDiv.className = className;

        const cleanText = String(text || "")
            .replace(/\u00A0/g, " ")
            .replace(/[\u200B-\u200D\uFEFF]/g, "")
            .trim();

        messageDiv.textContent = cleanText;

        chatbotMessages.appendChild(messageDiv);
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;

        return messageDiv;
    }

    function addItemMessage(item) {
        const itemDiv = document.createElement("div");
        itemDiv.className = "chatbot-item";

        itemDiv.innerHTML = `
            <strong>${escapeHtml(item.title || "상품명 없음")}</strong><br>
            가격: ${formatPrice(item.currentPrice)}<br>
            ${item.recommendReason ? escapeHtml(item.recommendReason) + "<br>" : ""}
            ${item.itemUrl ? `<a href="${escapeAttribute(item.itemUrl)}"
   target="_blank"
   onclick="logItemClick(${item.itemId}, '${escapeAttribute(item.title || '')}')">
   상품 보러가기
</a>` : ""}
        `;

        chatbotMessages.appendChild(itemDiv);
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
    }
    function logItemClick(itemId, keyword) {
    fetch(`/api/chatbot/items/${itemId}/click?keyword=${encodeURIComponent(keyword)}`, {
        method: "POST"
    }).catch(() => {});
    }

    function formatPrice(price) {
        if (price === null || price === undefined || price === "") {
            return "가격 정보 없음";
        }

        return Number(price).toLocaleString() + "원";
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }

    function escapeAttribute(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("\"", "&quot;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }
</script>

</body>
</html>
