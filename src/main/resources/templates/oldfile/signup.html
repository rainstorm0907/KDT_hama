<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        .container { width: 300px; margin: 50px auto; }
        .error { color: red; margin-bottom: 10px; font-size: 0.9rem; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>회원가입</h2>

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form th:action="@{/signup}" th:object="${signupRequest}" method="post">
        <input type="email" th:field="*{email}" placeholder="이메일 주소" required>
        <input type="text" th:field="*{nickname}" placeholder="닉네임" required>

        <input type="password" th:field="*{password}" placeholder="비밀번호" required>
        <input type="password" th:field="*{passwordConfirm}" placeholder="비밀번호 확인" required>

        <button type="submit">가입하기</button>
    </form>

    <p style="text-align: center;">
        <a th:href="@{/login}">로그인 페이지로 돌아가기</a>
    </p>
</div>
</body>
</html>
